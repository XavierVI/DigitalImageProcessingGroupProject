[workspace]
authors = ["xavier <xavierabarr@gmail.com>"]
channels = ["conda-forge"]
name = "group_project"
platforms = ["linux-64", "win-64"]
version = "0.1.0"

[tasks]
exp = "python main.py --visualize --llm-model=Qwen/Qwen2.5-1.5B-Instruct --object-model=PekingU/rtdetr_r50vd --output-dir=eval_videos"

yolo_exp = "python main.py --video-dir=data/traffic_light_detection --visualize --llm-model=Qwen/Qwen2.5-1.5B-Instruct --object-model=yolo --output-dir=traffic_light_eval"


test = "python main.py --visualize --llm-model=Qwen/Qwen2.5-1.5B-Instruct --object-model=PekingU/rtdetr_r50vd --max-videos=1"

yolo_test = "python main.py --video-dir=data/traffic_light_detection --visualize --llm-model=Qwen/Qwen2.5-1.5B-Instruct --object-model=yolo --max-videos=1 --output-dir=traffic_light_eval"


[dependencies]
python = ">=3.14.4,<3.15"
pip = ">=26.0.1,<27"


[pypi-dependencies]
torch = ">=2.11.0, <3"
torchvision = ">=0.26.0, <0.27"
matplotlib = ">=3.10.8, <4"
jupyterlab = ">=4.5.6, <5"
opencv-python = ">=4.13.0.92, <5"
transformers = ">=5.5.4, <6"
yt-dlp = ">=2026.3.17, <2027"
praw = ">=7.8.1, <8"
driving_assistant  = { path = ".", editable = true}
pytest = ">=9.0.3, <10"
accelerate = ">=1.13.0, <2"
bitsandbytes = ">=0.49.2, <0.50"
protobuf = ">=7.34.1, <8"
ultralytics = ">=8.4.45, <9"
